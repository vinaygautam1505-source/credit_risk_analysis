version: 2

models:
  - name: mart_city_wise_risky_loan
    description: "default rate and default customers for city wise risky loan analysis"

    columns:
      - name: CITY
        description: "customers current city name"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Bangalore', 'Delhi', 'Hyderabad', 'Jaipur','Mumbai', 'Pune', 'NA']

      - name: LOAN_PURPOSE
        description: "customers loan end use "
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Business', 'Education', 'Car', 'Home', 'Personal', 'NA']
            
