version: 2

models:
  - name: mart_high_risk_pattern
    description: "hih risk pattern analysis with number of total customers, default customersand default rates based on cibil_score, employment_status and income"
    columns:

      - name: ROI_BUCKET
        description: "roi bucket"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Highest_Roi', 'High_Roi', 'Average_Roi', 'Min_Roi']

      - name: CIBIL_BUCKET
        description: "cibil score bucket (Poor, Average, Good, Excellent)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Poor', 'Average', 'Good', 'Excellent']
          

      - name: INCOME_BUCKET
        description: "income level bucket (Low, Medium, High)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Poor_Income', 'Medium_Income', 'High_Income', 'Excellent_Income']   

      - name: TOTAL_CUSTOMERS
        description: "Total customers in each segment"

      - name: DEFAULT_CUSTOMERS
        description: "Number of customers who defaulted"

      - name: DEFAULT_RATE
        description: "Percentage of customers who defaulted in each segment"
