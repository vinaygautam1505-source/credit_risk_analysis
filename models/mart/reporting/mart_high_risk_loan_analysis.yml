
version: 2

models:
  - name: mart_high_risk_loan_analysis
    description: "hih risk pattern analysis with number of total customers, default customersand default rates based on loan amount, roi, tenure, cibil score, dti"
    columns:

      - name: LOAN_BUCKET
        description: "loan bucket"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Low-Loan_Amount', 'Average_Loan_Amount', 'High_Loan_Amount', 'Highest_Loan_Amount']


      - name: ROI_BUCKET
        description: "roi bucket"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Highest_Roi', 'High_Roi', 'Average_Roi', 'Min_Roi']
    

      - name: TENURE_BUCKET
        description: "tenure bucket"
       tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Low-Tenure', 'Average_Tenure', 'High_Tenure', 'Highest_Tenure']


      - name: CIBIL_BUCKET
        description: "cibil score bucket"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Poor (<=600)', 'Average (601-700)', 'Good (701-750)', 'Excellent (>751)']

      - name: DTI_BUCKET
        description: "dti bucket"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Low-Dti', 'Average_Dti', 'High_Dti', 'Highest_Dti']

      - name: TOTAL_CUSTOMERS
        description: "Total customers in each segment"

      - name: DEFAULT_CUSTOMERS
        description: "Number of customers who defaulted"

      - name: DEFAULT_RATE
        description: "Percentage of customers who defaulted in each segment"
