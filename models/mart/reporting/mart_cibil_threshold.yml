
version: 2
models:
  - name: mart_cibil_threshold
    description: "cibil threshold using different ranges of cibil score with the default rating and number of default customers"

    columns:
      - name: CIBIL_RANGE
        description: " cibil range with alert flags"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Poor (<=600)', 'Average (601-700)', 'Good (701-750)', 'Excellent (>751)']

      - name: DEFAULT_RATE
        description: "customers percentage who defaulted in respective category"
        tests:
          - not_null

      - name: TOTAL_DEFAULT_CUSTOMERS
        description: "Number of customers who defaulted in respective category"
        tests:
          - not_null
