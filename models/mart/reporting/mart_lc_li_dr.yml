
version: 2
models:
  - name: mart_lc_li_dr
    description: "default rate and number of default customers of low cibil and low income category"

    columns:
      - name: CIBIL_RANGE
        description: " cibil range with low cibil and low income category"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Poor', 'Average', 'Good', 'Excellent']

      - name: DEFAULT_RATE
        description: "customers percentage who defaulted in low cibil and low income category"
        tests:
          - not_null

      - name: TOTAL_DEFAULT_CUSTOMERS
        description: "Number of customers who defaulted in respective category"
        tests:
