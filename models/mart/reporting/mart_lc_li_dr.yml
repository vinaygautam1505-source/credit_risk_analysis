
version: 2
models:
  - name: mart_lc_li_dr
    description: "default rate and number of default customers of low cibil and low income category"

    columns:
      - name: LC_LI_DEFAULTERS
        description: " customers with having low cibil and low income category"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['HIGH_RISK','OTHERS']

      - name: TOTAL_CUSTOMERS
        description: "Total number of customers in each segment"
        tests:
          - not_null

      - name: DEFAULT_CUSTOMERS
        description: "Number of customers who defaulted in low cibil and low income category"
        tests:
          - not_null
        
      - name: DEFAULT_RATE
        description: "customers percentage who defaulted in low cibil and low income category"
        tests:
          - not_null

     
