version: 2

models:
  - name: DIM_EMPLOYMENT
    description: "employment dimension table"

    columns:

      - name: CUSTOMER_ID
        description: " customer unique identity"
        tests:
          - not_null
          - unique
          
      - name: EMPLOYMENT_STATUS
        description: "customer employment status"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Salaried', 'Self-Employed', 'Student', 'Unemployed', 'NA']

      - name: COMPANY_TYPE
        description: "company type where customer working"
        tests:
          - not_null

      - name: INCOME
        description: "total income per year"
        tests:
          - not_null
       
          
