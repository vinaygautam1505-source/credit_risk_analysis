version: 2

models:
  - name: fact_credit_risk_analysis
    description: "fact table of credit risk analysis"

    columns:
    
      - name: CIBIL_SCORE
        description: "cibil score rating"
        tests:
          - not_null

      - name: LOAN_AMOUNT
        description: "sanctioned loan amount"
          - not_null

      - name: INTEREST_RATE
        description: "interest rate per anuum"
        tests:
          - not_null
          -dbt_utils.expression_is_real:
            arguments:
              expression: "{{ column_name}} BETWEEN 7 AND 24"

      - name: LOAN_TENURE_MONTHS
        description: "loan tenure in months"
        tests:
          - not_null
          - accepted_values:
             arguments:
               expression: [12, 24, 36, 48, 60, 72]

      - name: DEBT_TO_INCOME_RATIO
        description: "foir income to emi ratio"
        tests:
          - not_null
          - dbt_utils.expression_is_real:
              arguments:
                expression: "{{column_name}} BETWEEN 0 AND 1"
            

      - name: CUSTOMER_ID
        description: "customer unique identity code"
        tests:
          - not_null
          - unique
