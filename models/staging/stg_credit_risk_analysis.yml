version: 2

models:
  - name: stg_credit_risk_analysis
    description: "cleared staging view"

    columns:
      - name: PRODUCT_ID
        description: "product unique code"
        tests:
          - not_null
          - unique

      - name: PRODUCT_NAME
        description: "iteam name"
        tests:
          - not_null

      - name: CATEGORY
        description: "iteam type"
        tests:
          - not_null

      - name: BRAND
        description: "iteam brand name"
        tests:
          - not_null

      - name: SELLER
        description: "seller name"
        tests:
          - not_null

      - name: SELLER_CITY
        description: "seller city"
        tests:
          - not_null

      - name: PRICE
        description: "product price"
        tests:
          - not_null

      - name: DISCOUNT_PERCENT
        description: "discounts"
        tests:
          - not_null

      - name: FINAL_PRICE
        description: "final_price"
        tests:
          - not_null

      - name: RATING
        description: "product rating"
        tests:
          - not_null

      - name: REVIEW_COUNT
        description: "rating rating"
        tests:
          - not_null

      - name: STOCK_AVAILABLE
        description: "availabe stock quantity"
        tests:
          - not_null

      - name: UNITS_SOLD
        description: "product sold quantity"

      - name: LISTING_DATE
        description: "product listing date"
        tests:
          - not_null

      - name: DELIVERY_DAYS
        description: "delivery tat"
        tests:
          - not_null

      - name: WEIGHT_GM
        description: "product weight"
        tests:
          - not_null

      - name: WARRANTY_MONTHS
        description: "total warranty months"
        tests:
          - not_null

      - name: COLOR
        description: "color"
        tests:
          - not_null

      - name: SIZE
        description: "size"
        tests:
          - not_null

      - name: RETURN_POLICY_DAYS
        description: "return policy days"
        tests:
          - not_null

      - name: IS_RETURNABLE
        description: "return or not"
        tests:
          - not_null

      - name: PAYMENT_MODES
        description: "payment type"
        tests:
          - not_null

      - name: SHIPPING_WEIGHT_GM
        description: "weight at the time of shipping"
        tests:
          - not_null

      - name: PRODUCT_SCORE
        description: "product score"
        tests:
          - not_null

      - name: SELLER_RATING
        description: "seller total ratings"
        tests:
          - not_null
