name: 'credit_risk_analysis'
version: '1.3.3'
config-version: 2

model-paths: ["models"]  
snapshot-paths: ["snapshots"]
seed-paths: ["seeds"]
test-paths: ["test"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"

models:
  credit_risk_analysis:
  
    staging:  
      +materialized: view
      +meta:
        on_schema_change: sync_all_columns
      +tags: ['staging']
      +persist_docs:
        relation: true
        columns: true

    intermediate_mart: 
      +materialized: table
      +mart:
        on_schema_change: sync_all_columns
      +tags: ['intermediate']
      +persist_docs:
        relation: true
        columns: true
  
          
    mart:  
      +materialized: table
      +meta:
        on_schema_change: sync_all_columns
      +tags: ['mart']
      +persist_docs:
        relation: true
        columns: true

snapshots:
  +materialized: snapshot
  +mart:
    on_schema_change: sync_all_columns
  +unique_key: 'CUSTOMER_ID'
  +strategy: = 'check'




    
